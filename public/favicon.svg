<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#grad1)" />
  
  <!-- Back Photo -->
  <g filter="url(#shadow)" transform="translate(100, 80) rotate(-15 156 156)">
    <rect width="240" height="240" rx="16" fill="#ffffff" opacity="0.8"/>
    <rect x="16" y="16" width="208" height="160" rx="8" fill="#e2e8f0"/>
  </g>
  
  <!-- Middle Photo -->
  <g filter="url(#shadow)" transform="translate(130, 110) rotate(-5 156 156)">
    <rect width="240" height="240" rx="16" fill="#ffffff" opacity="0.9"/>
    <rect x="16" y="16" width="208" height="160" rx="8" fill="#cbd5e1"/>
  </g>

  <!-- Front Photo -->
  <g filter="url(#shadow)" transform="translate(160, 140)">
    <rect width="240" height="240" rx="16" fill="#ffffff"/>
    <rect x="16" y="16" width="208" height="160" rx="8" fill="#f8fafc"/>
    
    <!-- Clock / Chrono element -->
    <circle cx="120" cy="96" r="48" fill="none" stroke="#3b82f6" stroke-width="12"/>
    <path d="M120 64 v32 l20 20" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
